<style>

/* DARK DEFAULT */
:root {
  --bg:#0b1220;
  --text:#e2e8f0;
  --card:#020617;
  --cardlink:#111f5e;
  --border:#1e293b;
  --link:#38bdf8;
  --muted:#94a3b8;
  --accent:#0ea5e9;
}

/* LIGHT MODE */
.light-mode {
  --bg:#f8fafc;
  --text:#1e293b;
  --card:#ffffff;
  --border:#e2e8f0;
  --link:#0ea5e9;
  --muted:#64748b;
  --accent:#0ea5e9;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
}

.logo img {height:40px;}

nav a {
  margin-left:15px;
  color:var(--muted);
  text-decoration:none;
}
nav a:hover {color:var(--link);}

/* TOGGLE */
.toggle {cursor:pointer;font-size:18px;}

/* HAMBURGER */
.menu-btn {
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* CLOSE BUTTON (HIDDEN DESKTOP) */
.close-btn {
  display:none;
}

/* MOBILE */
@media(max-width:768px){

  .menu-btn {display:block;}

  nav {
    position:fixed;
    top:0;
    left:-100%;
    width:75%;
    height:100%;
    background:var(--card);
    display:flex;
    flex-direction:column;
    padding:30px;
    transition:.3s;
    z-index:999;
  }

  nav.active {left:0;}

  nav a {
    margin:15px 0;
    font-size:18px;
  }

  /* SHOW CLOSE ONLY MOBILE */
  .close-btn {
    display:block;
    margin-bottom:20px;
    cursor:pointer;
    padding:8px 12px;
    background:var(--border);
    border-radius:8px;
  }
}

/* CONTAINER */
.container {
  max-width:820px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card {
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

/* GRID LINKS */
.grid-links {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.grid-links a {
  background:var(--cardlink);
  padding:15px;
  border-radius:10px;
  color:var(--text);
  text-decoration:none;
}

.grid-links a:hover {
  background:var(--accent);
}

/* FOOTER */
footer {
  border-top:1px solid var(--border);
  margin-top:40px;
}

.footer-container {
  max-width:820px;
  margin:auto;
  padding:30px 20px;
}

.footer-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:20px;
}

.footer-title {
  font-weight:bold;
  margin-bottom:10px;
}

.footer a {
  display:block;
  color:var(--muted);
  margin-bottom:6px;
  text-decoration:none;
}

.footer a:hover {color:var(--link);}

.footer-bottom {
  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:var(--muted);
}


/* HERO GRID */
.hero-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.hero-grid img {
  width:100%;
  border-radius:12px;
}

/* MOBILE */
@media(max-width:768px){
  .hero-grid {grid-template-columns:1fr;}
}

a {color:var(--link);}
</style>
